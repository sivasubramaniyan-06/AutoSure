<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <title>AUTOSURE — AI-Powered Insurance Claim Assessment</title>
    <meta
      name="description"
      content="AUTOSURE is an AI-powered vehicle insurance claim assessment platform that analyzes accident damage, estimates repair costs, and detects fraud in real-time."
    />
    <meta name="keywords" content="insurance claims, vehicle damage assessment, AI insurance, fraud detection" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:title" content="AUTOSURE — AI Insurance Claims" />
    <meta property="og:description" content="Submit and assess vehicle insurance claims with AI-powered analysis." />
    <meta property="og:type" content="website" />

    <!-- Security headers via meta (Vercel edge headers preferred in production) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
